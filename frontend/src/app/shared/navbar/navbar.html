<header class="navbar">
  <div class="navbar__inner">
    <a class="navbar__brand" routerLink="/publicaciones">
      <img src="favicon.svg" alt="" class="navbar__logo" width="32" height="32" />
      <span>Red Social</span>
    </a>

    <nav class="navbar__links">
      <a routerLink="/publicaciones" routerLinkActive="active">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1.5" />
          <rect x="14" y="3" width="7" height="7" rx="1.5" />
          <rect x="3" y="14" width="7" height="7" rx="1.5" />
          <rect x="14" y="14" width="7" height="7" rx="1.5" />
        </svg>
        Publicaciones
      </a>
      <a routerLink="/mi-perfil" routerLinkActive="active">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="4" />
          <path d="M5 20c1.5-4 4.5-6 7-6s5.5 2 7 6" />
        </svg>
        Mi perfil
      </a>
      <a routerLink="/dashboard/usuarios" routerLinkActive="active" appSoloAdmin>
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Usuarios
      </a>
      <a routerLink="/dashboard/estadisticas" routerLinkActive="active" appSoloAdmin>
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 3v18h18" />
          <path d="M7 16l4-6 4 3 5-8" />
        </svg>
        Estadísticas
      </a>
      @if (!isAuthenticated()) {
        <a routerLink="/login" routerLinkActive="active">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <path d="M10 17l5-5-5-5" />
            <path d="M15 12H3" />
          </svg>
          Login
        </a>
        <a routerLink="/registro" routerLinkActive="active">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="10" cy="8" r="4" />
            <path d="M3 20c1.8-4 4.5-6 7-6" />
            <path d="M19 11v6" />
            <path d="M16 14h6" />
          </svg>
          Registro
        </a>
      }
    </nav>

    <div class="navbar__actions">
      @if (currentUser(); as user) {
        <span class="navbar__user" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4" />
            <path d="M5 20c1.5-4 4.5-6 7-6s5.5 2 7 6" />
          </svg>
          <span class="navbar__user-text">
            <strong>{{ user.nombreUsuario | nombreUsuario }}</strong>
            <small>{{ user.perfil }}</small>
          </span>
        </span>
      }
      @if (isAuthenticated()) {
        <button class="btn btn-ghost btn-sm" type="button" (click)="logout()">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" style="width: 15px; height: 15px">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <path d="M16 17l5-5-5-5" />
            <path d="M21 12H9" />
          </svg>
          Salir
        </button>
      }
    </div>
  </div>
</header>
