@if (modal.visible()) {
  <div class="modal-backdrop" (click)="onBackdropClick($event)" role="presentation">
    <div
      class="modal"
      [class.modal--success]="modal.data().type === 'success'"
      [class.modal--error]="modal.data().type === 'error'"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="'modal-title'"
    >
      <div class="modal__icon">
        @switch (modal.data().type) {
          @case ('success') { ✓ }
          @case ('error') { ! }
          @default { i }
        }
      </div>
      <h2 id="modal-title" class="modal__title">{{ modal.data().title }}</h2>
      <p class="modal__message">{{ modal.data().message }}</p>
      @if (modal.data().confirm) {
        <div class="modal__actions">
          <button class="btn btn-ghost modal__btn" type="button" (click)="cancel()">
            {{ modal.data().cancelLabel ?? 'No' }}
          </button>
          <button class="btn btn-primary modal__btn" type="button" (click)="confirm()">
            {{ modal.data().confirmLabel ?? 'Sí, extender' }}
          </button>
        </div>
      } @else {
        <button class="btn btn-primary modal__btn" type="button" (click)="close()">
          Entendido
        </button>
      }
    </div>
  </div>
}
